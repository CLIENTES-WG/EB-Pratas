<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EB Pratas</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif
        }

        body {
            background: #f5f6f8;
            padding-bottom: 80px
        }

        body.no-scroll {
            overflow: hidden
        }

        header {
            text-align: center;
            padding: 20px
        }

        header img {
            width: 140px
        }

        nav {
            display: flex;
            overflow: auto;
            gap: 8px;
            padding: 10px;
            background: #fff
        }

        nav a {
            padding: 6px 12px;
            background: #eee;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            color: #333;
            white-space: nowrap;
        }

        section {
            padding: 15px;
            scroll-margin-top: 15px;
        }

        h2 {
            text-align: center;
            margin-bottom: 10px
        }

        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px
        }

        .product {
            background: #fff;
            border-radius: 10px;
            padding: 10px
        }

        .product img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 8px
        }

        .price {
            font-weight: bold;
            margin: 5px 0
        }

        button {
            width: 100%;
            padding: 8px;
            border: none;
            background: #000;
            color: #fff;
            border-radius: 6px
        }

        .cart {
            position: fixed;
            bottom: 90px;
            right: 15px;
            width: 55px;
            height: 55px;
            background: #000;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50
        }

        .cart span {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            padding: 3px 6px;
            border-radius: 50%;
            font-size: 12px
        }

        .cartDrawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 90%;
            background: #fff;
            border-radius: 20px 20px 0 0;
            transform: translateY(100%);
            transition: .3s;
            z-index: 100;
            display: flex;
            flex-direction: column
        }

        .cartDrawer.active {
            transform: translateY(0)
        }

        .cartHeader {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #eee
        }

        .cartItems {
            flex: 1;
            overflow: auto;
            padding: 10px
        }

        .item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            background: #f7f7f7;
            padding: 8px;
            border-radius: 8px
        }

        .remove {
            background: none;
            border: none;
            color: red
        }

        .cartFooter {
            padding: 15px;
            border-top: 1px solid #eee
        }

        .gift-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8f8f8;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #eee;
            cursor: pointer
        }

        .gift-left {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .gift-text strong {
            display: block;
            font-size: 14px
        }

        .gift-text span {
            font-size: 12px;
            color: #666
        }

        .gift-price {
            font-weight: bold
        }

        .total {
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 10px
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border-radius: 8px;
            border: 1px solid #ccc
        }

        .delivery-note {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            text-align: center;
        }

        .checkout {
            margin-top: 10px;
            padding: 12px;
            background: #000;
            color: #fff;
            border: none;
            border-radius: 10px
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .6);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 200
        }

        .modal.active {
            display: flex
        }

        .modal img {
            width: 90%;
            max-width: 350px;
            border-radius: 10px
        }

        .modalHint {
            color: #fff;
            font-size: 13px;
            margin-top: 10px;
            opacity: .9;
        }

        .modalDots {
            display: flex;
            justify-content: center;
            gap: 7px;
            margin-top: 12px;
        }

        .modalDot {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, .45);
            border-radius: 50%;
        }

        .modalDot.active {
            background: #fff;
            transform: scale(1.15);
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 300
        }

        .footer-fixed {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: #fff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #ddd;
            z-index: 40
        }

        .footer-fixed a {
            color: #000;
            font-size: 22px
        }
    </style>
</head>

        </div>

        <div class="cartItems" id="items"></div>

        <div class="cartFooter">

            <div class="gift-box" onclick="toggleGift()">

                    <input type="checkbox" id="gift" onclick="event.stopPropagation(); updateCart();">
                    <div class="gift-text">
                        <strong>Embalagem para presente</strong>
                        <span>Caixinha especial</span>
                    </div>
                </div>
                <div class="gift-price">+ R$ 1,00</div>
            </div>

            <div class="total" id="total"></div>

            <input id="name" placeholder="Seu nome">
            <select id="pay">
                <option value="">Pagamento</option>
                <option>Pix</option>
                <option>Dinheiro</option>
            </select>

            <textarea id="address" placeholder="Endereço"></textarea>

            <div class="delivery-note">
                A taxa de entrega será informada na conclusão do pedido via WhatsApp.
            </div>

            <button class="checkout" onclick="send()">Finalizar</button>
        </div>
    </div>

    <div class="modal" id="imgModal" onclick="closeImg(event)">

    </div>

    <div class="toast" id="toast">Produto adicionado</div>

                { name: "Anel aro torcido Numeração 22", price: 89.90, images: ["https://firebasestorage.googleapis.com/v0/b/albuns-mascarado.firebasestorage.app/o/loja%20duda%2FAnelarotorcidoNumera%C3%A7%C3%A3o22.jpeg?alt=media&token=7b2b0ffd-10d3-413e-b42c-7dbbdb1f9ec9", "https://firebasestorage.googleapis.com/v0/b/albuns-mascarado.firebasestorage.app/o/loja%20duda%2FAnelarotorcidoNumera%C3%A7%C3%A3o22.jpeg?alt=media&token=7b2b0ffd-10d3-413e-b42c-7dbbdb1f9ec9"] },
                { name: "Anel solitario zirconia 4mm cristal, Numeração 22", price: 84.90, images: ["https://firebasestorage.googleapis.com/v0/b/albuns-mascarado.firebasestorage.app/o/loja%20duda%2FAnelolitariozirconia4mmcristalNumera22.jpeg?alt=media&token=fcfae325-c3df-4c05-9e17-fa9403883f14", "https://firebasestorage.googleapis.com/v0/b/albuns-mascarado.firebasestorage.app/o/loja%20duda%2FAnelolitariozirconia4mmcristalNumera22.jpeg?alt=media&token=fcfae325-c3df-4c05-9e17-fa9403883f14"] },
                { name: "Anel solitario zirconia 6mm cristal, Numeração 22", price: 84.90, images: ["https://firebasestorage.googleapis.com/v0/b/albuns-mascarado.firebasestorage.app/o/loja%20duda%2FAnelsolitariozirconia6mmcristalNumer%2022.jpeg?alt=media&token=9ee9ab5a-17f8-4e18-a764-230cb38f02ff", "https://firebasestorage.googleapis.com/v0/b/albuns-mascarado.firebasestorage.app/o/loja%20duda%2FAnelsolitariozirconia6mmcristalNumer%2022.jpeg?alt=media&token=9ee9ab5a-17f8-4e18-a764-230cb38f02ff"] },
                { name: "Anel solitario cristal 5mm classico Numeração 12", price: 59.90, images: ["https://firebasestorage.googleapis.com/v0/b/albuns-mascarado.firebasestorage.app/o/loja%20duda%2FAnelsolitariocristal5mmclassicoNumera12.jpeg?alt=media&token=e2fd5c87-da7e-4df4-9593-881b13aa2e83", "https://firebasestorage.googleapis.com/v0/b/albuns-mascarado.firebasestorage.app/o/loja%20duda%2FAnelsolitariocristal5mmclassicoNumera12.jpeg?alt=media&token=e2fd5c87-da7e-4df4-9593-881b13aa2e83"] },
            ],
            
        };

        let cart = [];

        function money(v) {
            return v.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
        }

        function normalizeId(text) {
            return text
                .toLowerCase()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");
        }

        function render() {
            let html = "";

            Object.keys(products).forEach(cat => {
                let id = normalizeId(cat);

                html += `<section id="${id}">
<h2>${cat}</h2>
<div class="products">`;

                products[cat].forEach((p, i) => {
                    html += `
<div class="product">
<img src="${p.images[0]}" onclick="zoom('${cat}',${i})">
<h3>${p.name}</h3>
<div class="price">${money(p.price)}</div>
<button onclick="add('${cat}',${i})">Adicionar</button>
</div>`;
                });

                html += "</div></section>";
            });

            catalog.innerHTML = html;
        }

        function add(cat, i) {
            cart.push(products[cat][i]);
            count.innerText = cart.length;

            toast.style.display = "block";
            setTimeout(() => toast.style.display = "none", 1000);

            updateCart();
        }

        function toggleGift() {
            gift.checked = !gift.checked;
            updateCart();
        }

        function openCart() {
            cartDrawer.classList.add("active");
            document.body.classList.add("no-scroll");
            updateCart();
        }

        function closeCart() {
            cartDrawer.classList.remove("active");
            document.body.classList.remove("no-scroll");
        }

        function updateCart() {
            let html = "";
            let totalValue = 0;

            cart.forEach((p, i) => {
                html += `
<div class="item">
<span>${p.name}<br>${money(p.price)}</span>
<button class="remove" onclick="removeItem(${i})">X</button>
</div>`;
                totalValue += p.price;
            });

            if (gift.checked) totalValue += 1;

            items.innerHTML = html || "Carrinho vazio";
            total.innerText = "Total: " + money(totalValue);
        }

        function removeItem(i) {
            cart.splice(i, 1);
            count.innerText = cart.length;
            updateCart();
        }

        let imgs = [];
        let index = 0;

        function zoom(cat, i) {
            imgs = products[cat][i].images;
            index = 0;
            imgZoom.src = imgs[index];
            updateModalDots();
            imgModal.classList.add("active");
        }

        function updateModalDots() {
            let html = "";

            imgs.forEach((img, i) => {
                html += `<span class="modalDot ${i === index ? "active" : ""}"></span>`;
            });

            modalDots.innerHTML = html;
        }

        imgZoom.onclick = () => {
            if (imgs.length <= 1) return;

            index = index === imgs.length - 1 ? 0 : index + 1;
            imgZoom.src = imgs[index];
            updateModalDots();
        };

        function closeImg(e) {
            if (e.target.id === "imgModal") {
                imgModal.classList.remove("active");
            }
        }

        function send() {
            const nomeCliente = document.getElementById("name").value.trim();
            const formaPagamento = document.getElementById("pay").value;
            const enderecoCliente = document.getElementById("address").value.trim();

            if (cart.length === 0) {
                alert("Carrinho vazio");
                return;
            }

            if (nomeCliente === "" || formaPagamento === "" || enderecoCliente === "") {
                alert("Preencha todos os dados");
                return;
            }

            let msg = "*Pedido EB Pratas*%0A%0A";

            cart.forEach(p => {
                msg += `${p.name} - ${money(p.price)}%0A`;
            });

            msg += `%0A${total.innerText}`;
            msg += `%0A*Nome:* ${nomeCliente}`;
            msg += `%0A*Pagamento:* ${formaPagamento}`;
            msg += `%0A*Endereço:* ${enderecoCliente}`;
            msg += `%0A%0A*Observação:* A taxa de entrega será informada na conclusão do pedido.`;

            window.open(`https://wa.me/5566999663851?text=${msg}`);
        }

        render();
        updateCart();
    </script>
